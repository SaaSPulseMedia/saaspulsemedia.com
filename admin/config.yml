backend:
  name: git-gateway
  branch: main

media_folder: "site/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "site/articles"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    extension: "html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["SEO Tools", "CRM", "Email Marketing", "AI Writing", "AI Tools for Business", "Digital Marketing Tips", "Productivity Guides", "Project Management", "SaaS Tool Reviews", "SEO Strategies"] }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Key Insight", name: "key_insight", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
